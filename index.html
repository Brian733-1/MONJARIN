<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cookie Consent</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
 
  body {
    font-family: 'Nunito', sans-serif;
    background: #f5f0f8;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }
 
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.35);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 999;
    backdrop-filter: blur(3px);
  }
 
  .popup {
    background: #fff;
    border-radius: 24px;
    padding: 32px 28px 28px;
    max-width: 360px;
    width: 92%;
    text-align: center;
    box-shadow: 0 20px 60px rgba(200, 40, 120, 0.18), 0 4px 20px rgba(0,0,0,0.1);
    animation: popIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    position: relative;
  }
 
  @keyframes popIn {
    from { opacity: 0; transform: scale(0.85) translateY(20px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }
 
  h2 {
    font-size: 18px;
    font-weight: 800;
    color: #1a1a2e;
    margin-bottom: 10px;
    line-height: 1.3;
  }
 
  p {
    font-size: 13.5px;
    color: #666;
    line-height: 1.6;
    margin-bottom: 22px;
  }
 
  .btn-accept {
    display: block;
    width: 100%;
    padding: 15px;
    border-radius: 50px;
    border: none;
    background: linear-gradient(135deg, #e8196e, #c0125a);
    color: #fff;
    font-family: 'Nunito', sans-serif;
    font-size: 14px;
    font-weight: 800;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    cursor: pointer;
    text-decoration: none;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 6px 24px rgba(220,25,110,0.4);
    animation: btnPulse 2s ease-in-out infinite;
  }
 
  @keyframes btnPulse {
    0%   { box-shadow: 0 6px 24px rgba(220,25,110,0.4); }
    50%  { box-shadow: 0 6px 36px rgba(220,25,110,0.65); }
    100% { box-shadow: 0 6px 24px rgba(220,25,110,0.4); }
  }
 
  .btn-accept:hover {
    transform: translateY(-2px) scale(1.02);
    box-shadow: 0 10px 32px rgba(220,25,110,0.55);
  }
 
  .btn-accept:active {
    transform: scale(0.98);
  }
 
  .privacy-link {
    display: block;
    margin-top: 14px;
    font-size: 12px;
    color: #aaa;
    text-decoration: none;
    transition: color 0.2s;
  }
 
  .privacy-link:hover { color: #e8196e; }
</style>
</head>
<body>
 
<div class="overlay" id="overlay">
  <div class="popup">
 
    <h2>Configurações de Cookies</h2>
    <p>Para uma melhor experiência e acesso às ofertas exclusivas, aceite nossos termos de uso e cookies.</p>
 
    <a
      href="https://monjarim.top/?pv=prodq26k&af=afi11lnqyo"
      class="btn-accept"
      id="acceptBtn"
    >
      Aceitar e Continuar
    </a>
 
    <a href="https://monjarim.top/?pv=prodq26k&af=afi11lnqyo" class="privacy-link">Política de Privacidade</a>
 
  </div>
</div>
 
</body>
</html>
